services:
  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: algo_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      MONGO_INITDB_DATABASE: algo_backtest
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: algo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Server ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: algo_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/algo_backtest
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BACKTEST_WORKER_CONCURRENCY: 0   # 0 = API server does NOT process jobs
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Background Worker ──────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: algo_worker
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/algo_backtest
      REDIS_HOST: redis
      REDIS_PORT: 6379
      BACKTEST_WORKER_CONCURRENCY: 3
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1    # scale with: docker-compose up --scale worker=3

  # ── Bull Board (queue dashboard) ───────────────────────────────────────────
  bull-board:
    image: deadly0/bull-board:latest
    container_name: algo_bull_board
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_PREFIX: "bull"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  mongo_data:
  redis_data:
